      <stop offset="0%" stop-color="#6c63ff"/>
      <stop offset="100%" stop-color="#8b84ff"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff6b6b"/>
